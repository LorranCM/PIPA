<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações do Aluno</title>
</head>
<body>

    <container>

        <header class="">
            <img src="" alt="logo pipa">
            <img src="" alt="logo ifes">
            <p>menu hamburger</p>
        </header>

        <div class="perfil_aluno">
            <img src="" alt="banner do aluno">
            <img src="" alt="foto do aluno">
            <img src="" alt="icone de edição">
            <h1>Nome do Aluno</h1>
        </div>

        <div class="pagina">
            <div class="informacoes_aluno">
                <h3>Informações do Aluno</h3>
                <p>Nome:</p>
                <textarea name="nome" id="nome" cols="30" rows="1" placeholder="Seu nome"></textarea>
                <p>Email:</p>
                <textarea name="email" id="email" cols="30" rows="1" placeholder="Seu email"></textarea>
                <p>Mudar senha:</p>
                <textarea name="senha" id="senha" cols="30" rows="1" placeholder="Sua senha"></textarea>
                <p>Inserção:</p>
                <textarea name="insercao" id="insercao" cols="8" rows="1" placeholder="Aluno"></textarea> <!--Não vai ser textarea, só não sabia o que colocar no lugar de textarea-->
                <p>Curso:</p>
                <textarea name="curso" id="curso" cols="30" rows="1" placeholder="Seu curso"></textarea>
                <p>Período:</p>
                <textarea name="periodo" id="periodo" cols="8" rows="1" placeholder="Período"></textarea>
                <button>Salvar</button>
            </div>

            <div class="professores">
                <h1>Professores</h1>
                <div class="professor1">
                    <img src="" alt="banner do professor">
                    <img src="" alt="foto do professor">
                    <p>Nome do Professor</p>
                    <p>Matéria</p>
                </div>
                <div class="professor2">
                    <img src="" alt="banner do professor">
                    <img src="" alt="foto do professor">
                    <p>Nome do Professor</p>
                    <p>Matéria</p>
                </div>
                <div class="professor3">
                    <img src="" alt="banner do professor">
                    <img src="" alt="foto do professor">
                    <p>Nome do Professor</p>
                    <p>Matéria</p>
                </div>
            </div>
        </div>

        <footer>
            <!--Colocar o footer que sera feito-->
        </footer>

    </container>
    
</body>
</html>
