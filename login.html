<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/navbar.css">
    <link rel="stylesheet" href="styles/login_style.css">
    <link rel="icon" type="image/svg+xml" href="assets/icons/kite-origami-paper-svgrepo-com.svg">

<body>
    <nav id="navbar">
        <ul>
            <li id="navbar-PIPA-clickable"><a href="./landing.html"><img src="assets/icons/kite-origami-paper-svgrepo-com.svg"

        </ul>

    <div class="page-content">

                    <div class="input-text">
                        <label for="password">Senha</label>
                        <input type="password" name="password" id="password" placeholder="Senha">
                    </div>
                    <div>
                        <input type="checkbox" name="remember" id="remember"><label for="remember">Lembre de mim</label>
                    </div>
                    <p>
                        <a href="./recovery.html">Esqueci minha senha</a>
                    </p>
                    <p>Primeiro acesso? <a href="./register.html">Registrar</a></p>
                    <a href="student_profile.html">
                        <button type="button" class="button-login">Acessar</button>
                    </a>
                </div>
            </div>
        </form>
    </div>


    <footer class="footer">
        <img src="#" alt="logo pipa">
        <p>Portal de Informação Para Alunos</p>
        <div class="contact">
            <h3>Fale conosco</h3>
            <p>Email: saapifes@gmail.com

        </div>
        <div class="social-media">
            <p>Redes Sociais</p>
            <img src="#" alt="logo facebook">
            <img src="#" alt="logo instagram">
